<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:400px;
            margin:20px auto;
            padding:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin:8px 0;
            font-size:16px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            font-size:16px;
            box-sizing:border-box;
        }

        #reader{
            width:100%;
            margin-top:15px;
        }
    </style>
</head>

<body>

<h2>📦 Input Stock</h2>

<input type="text" id="polibox" placeholder="Polibox" readonly>
<button onclick="scanPolibox()">Scan Polibox</button>

<input type="text" id="material" placeholder="Material" readonly>
<button onclick="scanMaterial()">Scan Material</button>

<input type="number" id="qty" placeholder="Qty">

<div style="margin:10px 0;">
    <label>
        <input type="radio" name="jenis" value="Tambah" checked>
        Tambah
    </label>

    <label style="margin-left:20px;">
        <input type="radio" name="jenis" value="Ambil">
        Ambil
    </label>
</div>

<button onclick="submitData()">Submit</button>

<div id="reader"></div>

<script>

let scanner;

function scanPolibox(){

    document.getElementById("reader").innerHTML="";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps:10,
            qrbox:250
        },
        (text)=>{

            document.getElementById("polibox").value=text;

            scanner.stop();

        }
    );

}

function scanMaterial(){

    document.getElementById("reader").innerHTML="";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps:10,
            qrbox:250
        },
        (text)=>{

            document.getElementById("material").value=text;

            scanner.stop();

        }
    );

}

function submitData(){

    const data = {
        polibox: document.getElementById("polibox").value,
        material: document.getElementById("material").value,
        qty: document.getElementById("qty").value,
        jenis: document.querySelector('input[name="jenis"]:checked').value
    };

    console.log(data);

    alert("Data siap dikirim ke Google Sheets");
}



</script>

</body>
</html>

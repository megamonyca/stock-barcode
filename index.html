<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:400px;
            margin:20px auto;
            padding:15px;
        }

        button{
            width:100%;
            padding:12px;
            margin:8px 0;
            font-size:16px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            font-size:16px;
            box-sizing:border-box;
        }

        #reader{
            width:100%;
            margin-top:15px;
        }
    </style>
</head>

<body>

<h2>📦 Input Stock</h2>

<input type="text" id="polibox" placeholder="Polibox" readonly>

<input type="text" id="material" placeholder="Material" readonly>

<button onclick="startScan()">
📷 Mulai Scan
</button>

<input type="number" id="qty" placeholder="Qty">

<div style="margin:10px 0;">
    <label>
        <input type="radio" name="jenis" value="Tambah" checked>
        Tambah
    </label>

    <label style="margin-left:20px;">
        <input type="radio" name="jenis" value="Ambil">
        Ambil
    </label>
</div>

<button onclick="submitData()">Submit</button>

<div id="reader"></div>

<script>

let scanner;
let scanStep = "polibox";



function startScan() {

    scanStep = "polibox";

    document.getElementById("reader").innerHTML = "";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        onScanSuccess
    );

}

function onScanSuccess(text) {

    if (scanStep === "polibox") {

        document.getElementById("polibox").value = text;

        scanStep = "material";

        alert("Sekarang scan Material");

        return;
    }

    document.getElementById("material").value = text;

    scanner.stop();

}

async function submitData() {

    const data = {
        Timestamp: new Date().toLocaleString("id-ID"),
        Polibox: document.getElementById("polibox").value,
        Material: document.getElementById("material").value,
        Jenis: document.querySelector('input[name="jenis"]:checked').value,
        Qty: document.getElementById("qty").value
    };

    try {

        const response = await fetch("https://sheetdb.io/api/v1/24ih9th4qot6u", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                data: [data]
            })
        });

        const result = await response.json();
        console.log(result);

        alert("Berhasil disimpan!");

        document.getElementById("polibox").value = "";
        document.getElementById("material").value = "";
        document.getElementById("qty").value = "";

    } catch (err) {

        console.error(err);
        alert("Gagal menyimpan");

    }
}


</script>

</body>
</html>
